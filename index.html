<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Deen Connect X</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#050914;
color:white;
padding:15px;
}

.card{
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.08);
padding:20px;
border-radius:20px;
margin-bottom:15px;
backdrop-filter:blur(20px);
}

.gold{
color:#E2B747;
font-family:Orbitron;
}

.progress{
height:10px;
background:#111;
border-radius:30px;
overflow:hidden;
}

.fill{
height:100%;
width:0%;
background:#E2B747;
transition:.5s;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
margin-top:10px;
font-weight:bold;
background:#E2B747;
cursor:pointer;
}

textarea{
width:100%;
height:90px;
background:#111;
border:none;
color:white;
padding:10px;
border-radius:10px;
}

.prayer{
display:flex;
justify-content:space-between;
padding:10px;
margin-top:10px;
background:#0c1324;
border-radius:10px;
}

.big{
font-size:35px;
font-family:Orbitron;
}

</style>
</head>

<body>

<div class="card">

<h1 class="gold">
☪ Deen Connect X
</h1>

<p id="greeting"></p>

</div>


<div class="card">

<h3 class="gold">
Daily Hadith
</h3>

<p>
"The best among you are those with the best manners."
</p>

</div>


<div class="card">

<h3 class="gold">
Prayer Tracker
</h3>

<div class="prayer">
<span>Fajr</span>
<input type="checkbox" onchange="gainXP()">
</div>

<div class="prayer">
<span>Dhuhr</span>
<input type="checkbox" onchange="gainXP()">
</div>

<div class="prayer">
<span>Asr</span>
<input type="checkbox" onchange="gainXP()">
</div>

<div class="prayer">
<span>Maghrib</span>
<input type="checkbox" onchange="gainXP()">
</div>

<div class="prayer">
<span>Isha</span>
<input type="checkbox" onchange="gainXP()">
</div>

</div>



<div class="card">

<h3 class="gold">

Tasbeeh

</h3>

<div class="big" id="tasbeeh">

0

</div>

<button onclick="tasbeeh()">

Count

</button>

<button onclick="resetTasbeeh()">

Reset

</button>

</div>



<div class="card">

<h3 class="gold">

Level System

</h3>

Level:
<span id="level">

1

</span>

<br><br>

XP:
<span id="xp">

0

</span>

<div class="progress">

<div
class="fill"
id="fill">
</div>

</div>

</div>


<div class="card">

<h3 class="gold">

Notes Vault

</h3>

<textarea
id="note"></textarea>

<button onclick="saveNote()">

Save

</button>

</div>



<div class="card">

<h3 class="gold">

Achievements

</h3>

<div id="badge">

🌙 Beginner

</div>

</div>



<script>

let xp=
parseInt(
localStorage.getItem("xp")
)||0;

let level=
parseInt(
localStorage.getItem("level")
)||1;

let count=
parseInt(
localStorage.getItem("tas")
)||0;

document.getElementById(
"tasbeeh"
).innerText=count;

document.getElementById(
"xp"
).innerText=xp;

document.getElementById(
"level"
).innerText=level;

document.getElementById(
"note"
).value=
localStorage.getItem(
"note"
)||"";

update();

function tasbeeh(){

count++;

localStorage.setItem(
"tas",
count
);

document.getElementById(
"tasbeeh"
).innerText=count;

}

function resetTasbeeh(){

count=0;

localStorage.setItem(
"tas",
0
);

document.getElementById(
"tasbeeh"
).innerText=0;

}

function gainXP(){

xp+=20;

if(xp>=100){

level++;

xp=0;

}

localStorage.setItem(
"xp",
xp
);

localStorage.setItem(
"level",
level
);

update();

}

function update(){

document.getElementById(
"xp"
).innerText=xp;

document.getElementById(
"level"
).innerText=level;

document.getElementById(
"fill"
).style.width=
xp+"%";

let b=
"🌙 Beginner";

if(level>=2)
b+=" 🏆 Consistent";

if(level>=5)
b+=" ⭐ Elite";

document.getElementById(
"badge"
).innerText=b;

}

function saveNote(){

localStorage.setItem(
"note",
document.getElementById(
"note"
).value
);

alert(
"Saved"
);

}

let h=
new Date().getHours();

let text="";

if(h<12)
text=
"☀ Assalamu Alaikum";

else if(h<18)
text=
"🌤 Keep improving";

else
text=
"🌙 Prepare for Isha";

document.getElementById(
"greeting"
).innerText=text;

</script>

</body>
</html>
