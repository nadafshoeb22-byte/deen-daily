<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ELITE 5.0 | Founder's Dashboard</title>
    <style>
        :root {
            --bg: #030409; --panel: rgba(255,255,255,0.03);
            --accent: #E2B747; --glass: blur(40px) saturate(200%);
        }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding: 20px; }
        
        /* GRID SYSTEM */
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        
        .panel { 
            background: var(--panel); border: 1px solid rgba(255,255,255,0.08); 
            border-radius: 24px; padding: 25px; backdrop-filter: var(--glass);
            transition: 0.3s; position: relative; overflow: hidden;
        }
        .panel:hover { border-color: var(--accent); transform: translateY(-5px); }
        
        h2 { font-size: 1rem; color: var(--accent); margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
        
        /* UI ELEMENTS */
        .stat-val { font-size: 2.5rem; font-weight: 800; font-family: 'Orbitron'; }
        button { 
            background: var(--accent); border: none; padding: 12px 20px; 
            border-radius: 12px; font-weight: bold; cursor: pointer; color: #000;
            width: 100%; margin-top: 10px; transition: 0.3s;
        }
        button:hover { filter: brightness(1.2); }
        
        /* HEATMAP */
        .heatmap { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .cell { aspect-ratio: 1; background: #111; border-radius: 4px; }
        .cell.active { background: var(--accent); box-shadow: 0 0 10px var(--accent); }
    </style>
</head>
<body>

    <div class="dashboard">
        <!-- COMMAND CENTER -->
        <div class="panel" style="grid-column: 1 / -1;">
            <h2>Shoeb Nadaf // Founder's Terminal</h2>
            <div style="display:flex; gap:20px;">
                <input type="text" placeholder="Quick log / Command..." style="width:100%; background:transparent; border:none; border-bottom:1px solid #444; color:#fff; font-size:1.2rem;">
            </div>
        </div>

        <!-- PRODUCTIVITY -->
        <div class="panel">
            <h2>Consistency Matrix</h2>
            <div class="stat-val" id="score">88%</div>
            <div class="heatmap" id="map"></div>
        </div>

        <!-- ALPHA MODULE -->
        <div class="panel">
            <h2>Alpha Aesthetics</h2>
            <p>Beard Streak: <span id="beard-count">12</span> Days</p>
            <button onclick="incBeard()">Log Grooming Session</button>
        </div>

        <!-- FOCUS SPRINT -->
        <div class="panel">
            <h2>Focus Sprint</h2>
            <div class="stat-val" id="timer">50:00</div>
            <button onclick="startSprint()">Start Deep Work</button>
        </div>
    </div>

    <script>
        // INIT HEATMAP
        const map = document.getElementById('map');
        for(let i=0; i<28; i++) {
            map.innerHTML += `<div class="cell ${Math.random()>0.7?'active':''}"></div>`;
        }

        // ALPHA LOGIC
        function incBeard() {
            let b = parseInt(document.getElementById('beard-count').innerText) + 1;
            document.getElementById('beard-count').innerText = b;
        }

        // TIMER LOGIC
        function startSprint() {
            let t = 3000;
            setInterval(() => {
                t--;
                let m = Math.floor(t/60); let s = t%60;
                document.getElementById('timer').innerText = `${m}:${s}`;
            }, 1000);
        }
    </script>
</body>
</html>
